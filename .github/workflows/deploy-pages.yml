name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Single concurrent deploy; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

# The deploy-pages action needs these to upload artifacts and call the Pages API.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
